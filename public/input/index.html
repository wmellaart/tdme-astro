<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tdme · Input</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #fff; font-family: 'Inter', -apple-system, sans-serif; color: #1d1d1f; -webkit-font-smoothing: antialiased; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-4px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0.12); }
      50%       { box-shadow: 0 0 0 7px rgba(0,0,0,0); }
    }

    .msg-enter { animation: fadeIn 0.18s ease forwards; }
    textarea:focus { border-color: #1d1d1f !important; outline: none; }
    button { font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const WORKER_URL = "https://tdme-input.wmellaart.workers.dev";
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const hasSpeech = !!SpeechRecognition;

    const SYSTEM_PROMPT = `Je bent een kennisextractie-interviewer. Je taak is om de marketing expertise van Frank Schuyer en Wouter Mellaart systematisch vast te leggen, zodat die gebruikt kan worden als kennisbasis voor de tdme Marketing Agent — een AI-assistent die start-ups en scale-ups adviseert op het gebied van go-to-market strategie, positionering, B2B marketing en branding.

Je voert een diepgaand, conversationeel interview. Je doel is om concrete, specifieke en bruikbare inzichten te verzamelen — geen abstracte algemeenheden.

Gespreksonderwerpen (werk ze organisch af, forceer geen volgorde):
1. De frameworks en aanpakken die de persoon structureel gebruikt bij marketing- en groeivraagstukken
2. De meest voorkomende fouten of blinde vlekken die hij ziet bij founders van start-ups en scale-ups
3. Hoe hij go-to-market strategie aanpakt — stappen, valkuilen, succesfactoren
4. Zijn aanpak voor positionering en propositie-ontwikkeling
5. Inzichten over B2B marketing & sales (alignment, pipeline, kanalen)
6. Wat hij ziet werken in digitale marketing en groei voor vroeg-stadium bedrijven
7. Zijn visie op branding en communicatie voor start-ups

Instructies:
- Stel ALTIJD maar één vraag tegelijk
- Vraag door als een antwoord interessant of concreet is — ga de diepte in
- Vermijd algemeenheden — vraag altijd om een voorbeeld, een case, of een vuistregel
- Spreek de persoon aan op zijn voornaam
- Na 12-15 uitwisselingen, of als de persoon aangeeft klaar te zijn, bied je aan om de inzichten samen te vatten
- Schrijf altijd in het Nederlands
- Begin met een warme, professionele introductie en je eerste vraag`;

    const SUMMARY_PROMPT = (name, conversation) =>
`Dit is een transcript van een kennisextractie-interview met ${name}:

${conversation}

Maak nu een gestructureerde samenvatting van alle opgehaalde kennis en inzichten. Gebruik de volgende structuur:

## Marketing frameworks & aanpakken
## Veelgemaakte fouten bij founders
## Go-to-market aanpak
## Positionering & propositie
## B2B marketing & sales
## Digitale marketing & groei
## Branding & communicatie
## Overige inzichten & vuistregels

Wees specifiek en concreet. Dit wordt direct gebruikt als kennisbasis voor een AI-agent.`;

    const callClaude = async (system, messages, maxTokens = 1000) => {
      const body = { model:"claude-sonnet-4-6", max_tokens:maxTokens, messages };
      if (system) body.system = system;
      const res = await fetch(WORKER_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.content?.[0]?.text || "";
    };

    const downloadMd = (expertName, text) => {
      const date = new Date().toISOString().slice(0, 10);
      const slug = expertName.toLowerCase().replace(/\s+/g, "-");
      const blob = new Blob([`# tdme Input — ${expertName}\n_${date}_\n\n---\n\n` + text], { type:"text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `tdme-input-${slug}-${date}.md`; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    const fmt = (text) =>
      text.split("\n").map((line, i, arr) => (
        <span key={i}>{line}{i < arr.length - 1 && <br />}</span>
      ));

    const C = {
      white:  "#ffffff",
      bg:     "#f5f5f7",
      ink:    "#1d1d1f",
      mid:    "#6e6e73",
      light:  "#aeaeb2",
      border: "#e5e5ea",
    };

    const MicIcon = ({ on }) => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3" fill={on?"currentColor":"none"} />
        <path d="M5 10a7 7 0 0 0 14 0" />
        <line x1="12" y1="19" x2="12" y2="22" />
        <line x1="8" y1="22" x2="16" y2="22" />
      </svg>
    );

    function KennisAgent() {
      const [phase,     setPhase]     = useState("start");
      const [expert,    setExpert]    = useState(null);
      const [messages,  setMessages]  = useState([]);
      const [input,     setInput]     = useState("");
      const [loading,   setLoading]   = useState(false);
      const [summary,   setSummary]   = useState("");
      const [msgCount,  setMsgCount]  = useState(0);
      const [saved,     setSaved]     = useState(false);
      const [listening, setListening] = useState(false);
      const [interim,   setInterim]   = useState("");

      const bottomRef  = useRef(null);
      const inputRef   = useRef(null);
      const recognizer = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading]);
      useEffect(() => { if (phase === "chat" && !loading) inputRef.current?.focus(); }, [phase, loading]);

      useEffect(() => {
        if (!hasSpeech) return;
        const r = new SpeechRecognition();
        r.lang = "nl-NL"; r.continuous = true; r.interimResults = true;
        r.onresult = (e) => {
          let fin = "", intr = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            e.results[i].isFinal ? fin += t : intr += t;
          }
          if (fin) setInput(p => (p + " " + fin).trim());
          setInterim(intr);
        };
        r.onend  = () => { setListening(false); setInterim(""); };
        r.onerror= () => { setListening(false); setInterim(""); };
        recognizer.current = r;
        return () => { try { r.stop(); } catch(_) {} };
      }, []);

      const toggleMic = () => {
        if (!hasSpeech) return;
        if (listening) { recognizer.current.stop(); setListening(false); }
        else { try { recognizer.current.start(); setListening(true); } catch(_) {} }
      };
      const stopMic = () => { if (listening) { recognizer.current.stop(); setListening(false); } };

      const fullName = expert === "frank" ? "Frank Schuyer" : "Wouter Mellaart";
      const name     = expert === "frank" ? "Frank" : "Wouter";

      const startSession = async (person) => {
        setExpert(person); setPhase("chat"); setLoading(true);
        const n = person === "frank" ? "Frank" : "Wouter";
        const seed = [{ role:"user", content:`Hallo, ik ben ${n}.` }];
        try {
          const reply = await callClaude(SYSTEM_PROMPT, seed);
          setMessages([...seed, { role:"assistant", content:reply }]);
          setMsgCount(1);
        } catch(e) {
          setMessages([...seed, { role:"assistant", content:`Fout: ${e.message}` }]);
        }
        setLoading(false);
      };

      const sendMessage = async () => {
        stopMic();
        if (!input.trim() || loading) return;
        const userMsg = { role:"user", content:input.trim() };
        const updated = [...messages, userMsg];
        setMessages(updated); setInput(""); setInterim(""); setLoading(true);
        try {
          const reply = await callClaude(SYSTEM_PROMPT, updated);
          setMessages([...updated, { role:"assistant", content:reply }]);
          setMsgCount(c => c + 1);
        } catch(e) {
          setMessages([...updated, { role:"assistant", content:`Fout: ${e.message}` }]);
        }
        setLoading(false);
      };

      const generateSummary = async () => {
        stopMic(); setPhase("summary"); setLoading(true); setSummary(""); setSaved(false);
        const transcript = messages.map(m => `${m.role==="user"?fullName:"Agent"}: ${m.content}`).join("\n\n");
        try {
          const text = await callClaude(null, [{ role:"user", content:SUMMARY_PROMPT(fullName, transcript) }], 2000);
          setSummary(text);
        } catch(e) { setSummary(`Fout: ${e.message}`); }
        setLoading(false);
      };

      const handleKey = (e) => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
      const handleCopy = () => { navigator.clipboard.writeText(summary); setSaved(true); setTimeout(()=>setSaved(false),2500); };

      // ── START ──────────────────────────────────────────────────────────────
      if (phase === "start") return (
        <div style={{ minHeight:"100dvh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"32px", padding:"48px 24px", background:C.white }}>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:"12px" }}>
            <p style={{ fontSize:"12px", letterSpacing:"1px", color:C.light, fontWeight:500 }}>tdme · Input</p>
            <h1 style={{ fontSize:"clamp(32px,5vw,52px)", fontWeight:600, letterSpacing:"-1.5px", color:C.ink, lineHeight:1.05 }}>Wie ben jij?</h1>
            <p style={{ fontSize:"16px", color:C.mid, textAlign:"center", maxWidth:"340px", lineHeight:1.55, marginTop:"4px" }}>
              Gerichte vragen om jouw marketingkennis vast te leggen als basis voor de tdme Marketing Agent.
            </p>
            <p style={{ fontSize:"13px", color:C.light, textAlign:"center", maxWidth:"320px", lineHeight:1.6, marginTop:"-12px" }}>
              Aan het einde kun je de samenvatting downloaden als bestand of kopiëren — stuur die daarna naar Wouter.
            </p>
          </div>
          <div style={{ display:"flex", gap:"10px" }}>
            {["frank","wouter"].map(p => (
              <button key={p} onClick={() => startSession(p)}
                style={{ padding:"12px 28px", background:C.bg, color:C.ink, border:`1px solid ${C.border}`, borderRadius:"980px", fontSize:"15px", fontWeight:500, cursor:"pointer", transition:"all 0.15s" }}
                onMouseEnter={e => e.currentTarget.style.background = "#ebebed"}
                onMouseLeave={e => e.currentTarget.style.background = C.bg}
              >
                {p === "frank" ? "Frank Schuyer" : "Wouter Mellaart"}
              </button>
            ))}
          </div>
        </div>
      );

      // ── CHAT ───────────────────────────────────────────────────────────────
      if (phase === "chat") return (
        <div style={{ minHeight:"100dvh", display:"flex", flexDirection:"column", background:C.white }}>
          <div style={{ padding:"12px 20px", borderBottom:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
            <span style={{ fontSize:"13px", color:C.light, fontWeight:500, letterSpacing:"0.5px" }}>tdme · Input</span>
            <span style={{ fontSize:"13px", color:C.mid, fontWeight:400 }}>{fullName}</span>
          </div>

          <div style={{ flex:1, overflow:"auto", padding:"20px 24px", display:"flex", flexDirection:"column", gap:"14px", maxWidth:"680px", width:"100%", margin:"0 auto", alignSelf:"center" }}>
            {messages.map((msg, i) =>
              msg.role === "assistant" ? (
                <div key={i} className="msg-enter" style={{ alignSelf:"flex-start", maxWidth:"82%" }}>
                  <div style={{ background:C.bg, padding:"12px 16px", borderRadius:"4px 18px 18px 18px", fontSize:"15px", lineHeight:1.6, color:C.ink }}>
                    {fmt(msg.content)}
                  </div>
                </div>
              ) : (
                <div key={i} className="msg-enter" style={{ alignSelf:"flex-end", maxWidth:"72%" }}>
                  <div style={{ background:C.ink, padding:"12px 16px", borderRadius:"18px 4px 18px 18px", fontSize:"15px", lineHeight:1.6, color:C.white }}>
                    {fmt(msg.content)}
                  </div>
                </div>
              )
            )}
            {loading && (
              <div style={{ alignSelf:"flex-start" }}>
                <div style={{ background:C.bg, padding:"14px 18px", borderRadius:"4px 18px 18px 18px", display:"inline-flex", gap:"4px", alignItems:"center" }}>
                  {["0s","0.2s","0.4s"].map(d => (
                    <span key={d} style={{ width:"5px", height:"5px", borderRadius:"50%", background:C.light, display:"inline-block", animation:`bounce 1.2s ${d} infinite ease-in-out` }} />
                  ))}
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          <div style={{ borderTop:`1px solid ${C.border}`, padding:"10px 20px", background:C.white, flexShrink:0 }}>
            <div style={{ maxWidth:"680px", width:"100%", margin:"0 auto", display:"flex", gap:"8px", alignItems:"flex-end" }}>
              {msgCount >= 8 && (
                <button onClick={generateSummary}
                  style={{ padding:"8px 14px", background:"transparent", color:C.mid, border:`1px solid ${C.border}`, borderRadius:"980px", fontSize:"13px", fontWeight:500, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>
                  Samenvatting
                </button>
              )}
              <textarea
                ref={inputRef}
                style={{ flex:1, padding:"10px 16px", fontSize:"15px", fontFamily:"Inter,-apple-system,sans-serif", border:`1px solid ${C.border}`, borderRadius:"22px", background:C.bg, color: interim ? C.mid : C.ink, resize:"none", minHeight:"42px", maxHeight:"120px", lineHeight:1.5 }}
                value={input + (interim ? " " + interim : "")}
                onChange={e => { if (!listening) setInput(e.target.value); }}
                onKeyDown={handleKey}
                placeholder={listening ? "Luisteren…" : "Typ of spreek…"}
                rows={1} disabled={loading}
              />
              {hasSpeech && (
                <button onClick={toggleMic} disabled={loading}
                  style={{ width:"40px", height:"40px", borderRadius:"50%", border:`1px solid ${listening ? C.ink : C.border}`, background:listening ? C.ink : "transparent", color:listening ? C.white : C.mid, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, animation:listening?"pulse 1.4s infinite":"none", transition:"all 0.2s" }}>
                  <MicIcon on={listening} />
                </button>
              )}
              <button onClick={sendMessage} disabled={!input.trim() || loading}
                style={{ width:"40px", height:"40px", borderRadius:"50%", border:"none", background:!input.trim()||loading ? C.bg : C.ink, color:!input.trim()||loading ? C.light : C.white, cursor:!input.trim()||loading?"not-allowed":"pointer", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.15s" }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="12" y1="19" x2="12" y2="5" /><polyline points="5 12 12 5 19 12" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      );

      // ── SUMMARY ────────────────────────────────────────────────────────────
      return (
        <div style={{ minHeight:"100dvh", background:C.white, display:"flex", flexDirection:"column" }}>
          <div style={{ padding:"12px 20px", borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
            <span style={{ fontSize:"13px", color:C.light, fontWeight:500 }}>tdme · Input</span>
          </div>
          <div style={{ flex:1, overflow:"auto", padding:"40px 32px", maxWidth:"680px", width:"100%", margin:"0 auto", alignSelf:"center" }}>
            <h2 style={{ fontSize:"26px", fontWeight:600, letterSpacing:"-0.5px", marginBottom:"4px" }}>Samenvatting</h2>
            <p style={{ fontSize:"13px", color:C.light, marginBottom:"28px", paddingBottom:"20px", borderBottom:`1px solid ${C.border}` }}>
              {fullName} · {new Date().toLocaleDateString("nl-NL", { day:"numeric", month:"long", year:"numeric" })}
            </p>
            {loading ? (
              <p style={{ color:C.mid, fontSize:"15px" }}>Samenvatting wordt gegenereerd…</p>
            ) : (
              <>
                <div style={{ fontSize:"15px", lineHeight:1.8, whiteSpace:"pre-wrap", color:C.ink }}>{summary}</div>
                <div style={{ display:"flex", gap:"8px", marginTop:"32px", flexWrap:"wrap" }}>
                  <button onClick={() => downloadMd(fullName, summary)}
                    style={{ padding:"10px 22px", background:C.ink, color:C.white, border:"none", borderRadius:"980px", fontSize:"14px", fontWeight:500, cursor:"pointer" }}>
                    Download .md
                  </button>
                  <button onClick={handleCopy}
                    style={{ padding:"10px 18px", background:"transparent", color:C.ink, border:`1px solid ${C.border}`, borderRadius:"980px", fontSize:"14px", fontWeight:500, cursor:"pointer" }}>
                    {saved ? "Gekopieerd ✓" : "Kopieer"}
                  </button>
                  <button onClick={() => { setPhase("chat"); setSummary(""); }}
                    style={{ padding:"10px 14px", background:"transparent", color:C.mid, border:`1px solid ${C.border}`, borderRadius:"980px", fontSize:"14px", cursor:"pointer" }}>
                    ← Terug
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<KennisAgent />);
  </script>
</body>
</html>
