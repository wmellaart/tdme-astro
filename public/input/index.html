<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tdme · Input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #f5f0e8; font-family: 'Libre Baskerville', Georgia, serif; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.45); }
      50%       { box-shadow: 0 0 0 9px rgba(192,57,43,0); }
    }

    .msg-enter { animation: fadeIn 0.25s ease forwards; }

    textarea:focus, input:focus { border-color: #2d5a3d !important; box-shadow: 0 0 0 2px rgba(45,90,61,0.12); outline: none; }
    button { font-family: 'Libre Baskerville', serif; }
    button:hover:not(:disabled) { opacity: 0.82; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8c0b5; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

  const WORKER_URL = "https://tdme-input.wmellaart.workers.dev";

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const hasSpeech = !!SpeechRecognition;

    // ─── PROMPTS ────────────────────────────────────────────────────────────

    const SYSTEM_PROMPT = `Je bent een kennisextractie-interviewer. Je taak is om de marketing expertise van Frank Schuyer en Wouter Mellaart systematisch vast te leggen, zodat die gebruikt kan worden als kennisbasis voor de tdme Marketing Agent — een AI-assistent die start-ups en scale-ups adviseert op het gebied van go-to-market strategie, positionering, B2B marketing en branding.

Je voert een diepgaand, conversationeel interview. Je doel is om concrete, specifieke en bruikbare inzichten te verzamelen — geen abstracte algemeenheden.

Gespreksonderwerpen (werk ze organisch af, forceer geen volgorde):
1. De frameworks en aanpakken die de persoon structureel gebruikt bij marketing- en groeivraagstukken
2. De meest voorkomende fouten of blinde vlekken die hij ziet bij founders van start-ups en scale-ups
3. Hoe hij go-to-market strategie aanpakt — stappen, valkuilen, succesfactoren
4. Zijn aanpak voor positionering en propositie-ontwikkeling
5. Inzichten over B2B marketing & sales (alignment, pipeline, kanalen)
6. Wat hij ziet werken in digitale marketing en groei voor vroeg-stadium bedrijven
7. Zijn visie op branding en communicatie voor start-ups

Instructies:
- Stel ALTIJD maar één vraag tegelijk
- Vraag door als een antwoord interessant of concreet is — ga de diepte in
- Vermijd algemeenheden — vraag altijd om een voorbeeld, een case, of een vuistregel
- Spreek de persoon aan op zijn voornaam
- Na 12-15 uitwisselingen, of als de persoon aangeeft klaar te zijn, bied je aan om de inzichten samen te vatten
- Schrijf altijd in het Nederlands
- Begin met een warme, professionele introductie en je eerste vraag`;

    const SUMMARY_PROMPT = (name, conversation) =>
`Dit is een transcript van een kennisextractie-interview met ${name}:

${conversation}

Maak nu een gestructureerde samenvatting van alle opgehaalde kennis en inzichten. Gebruik de volgende structuur:

## Marketing frameworks & aanpakken
## Veelgemaakte fouten bij founders
## Go-to-market aanpak
## Positionering & propositie
## B2B marketing & sales
## Digitale marketing & groei
## Branding & communicatie
## Overige inzichten & vuistregels

Wees specifiek en concreet. Dit wordt direct gebruikt als kennisbasis voor een AI-agent.`;

    // ─── API ────────────────────────────────────────────────────────────────

    const callClaude = async (system, messages, maxTokens = 1000) => {
      const body = { model: "claude-sonnet-4-6", max_tokens: maxTokens, messages };
      if (system) body.system = system;
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.content?.[0]?.text || "";
    };

    const downloadMd = (expertName, text) => {
      const date = new Date().toISOString().slice(0, 10);
      const slug = expertName.toLowerCase().replace(/\s+/g, "-");
      const blob = new Blob([`# tdme Input — ${expertName}\n_${date}_\n\n---\n\n` + text], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `tdme-input-${slug}-${date}.md`; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    };

    const fmt = (text) =>
      text.split("\n").map((line, i, arr) => (
        <span key={i}>{line}{i < arr.length - 1 && <br />}</span>
      ));

    // ─── STYLES ─────────────────────────────────────────────────────────────

    const C = { cream:"#f5f0e8", ink:"#1a1614", green:"#2d5a3d", red:"#c0392b", muted:"#6b6360", border:"#d6cfc4", subtle:"#c8c0b5", white:"#ffffff" };

    const S = {
      root: { minHeight:"100dvh", background:C.cream, color:C.ink, display:"flex", flexDirection:"column" },
      header: { borderBottom:`2px solid ${C.ink}`, padding:"18px 32px", display:"flex", alignItems:"baseline", justifyContent:"space-between", flexWrap:"wrap", gap:"8px", flexShrink:0 },
      logo: { fontFamily:"'Playfair Display',serif", fontSize:"22px", fontWeight:700, letterSpacing:"-0.5px" },
      headerSub: { fontSize:"11px", letterSpacing:"2.5px", textTransform:"uppercase", color:C.muted, marginLeft:"12px" },
      badge: { fontSize:"11px", letterSpacing:"1.5px", textTransform:"uppercase", background:C.green, color:C.cream, padding:"4px 12px", borderRadius:"2px" },

      startWrap: { flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"48px 24px", gap:"40px" },
      h1: { fontFamily:"'Playfair Display',serif", fontSize:"clamp(26px,5vw,46px)", fontWeight:700, letterSpacing:"-1px", textAlign:"center", lineHeight:1.2, maxWidth:"560px" },
      desc: { fontSize:"15px", lineHeight:1.75, color:C.muted, maxWidth:"440px", textAlign:"center" },
      personBtns: { display:"flex", gap:"16px", flexWrap:"wrap", justifyContent:"center" },
      personBtn: { padding:"14px 36px", border:`2px solid ${C.ink}`, background:"transparent", color:C.ink, fontSize:"16px", fontFamily:"'Playfair Display',serif", fontWeight:700, cursor:"pointer", borderRadius:"2px", transition:"all 0.15s" },

      chatArea: { flex:1, overflow:"auto", padding:"28px 32px", display:"flex", flexDirection:"column", gap:"22px", maxWidth:"760px", width:"100%", margin:"0 auto", alignSelf:"center" },
      agentMsg: { display:"flex", flexDirection:"column", gap:"5px", alignSelf:"flex-start", maxWidth:"88%" },
      userMsg:  { display:"flex", flexDirection:"column", gap:"5px", alignSelf:"flex-end", maxWidth:"80%", alignItems:"flex-end" },
      lbl: (s) => ({ fontSize:"10px", letterSpacing:"2px", textTransform:"uppercase", color: s==="left"?C.green:C.muted, fontWeight:700 }),
      agentBubble: { background:C.white, border:`1px solid ${C.border}`, borderLeft:`3px solid ${C.green}`, padding:"14px 18px", borderRadius:"0 4px 4px 0", fontSize:"15px", lineHeight:1.75 },
      userBubble:  { background:C.ink, padding:"14px 18px", borderRadius:"4px 0 4px 4px", fontSize:"15px", lineHeight:1.75, color:C.cream },
      dot: (d) => ({ display:"inline-block", width:"6px", height:"6px", borderRadius:"50%", background:C.green, margin:"0 2px", animation:`bounce 1.2s ${d} infinite ease-in-out` }),

      inputBar: { borderTop:`2px solid ${C.ink}`, padding:"14px 24px", background:C.cream, flexShrink:0 },
      inputInner: { maxWidth:"760px", width:"100%", margin:"0 auto", display:"flex", gap:"10px", alignItems:"flex-end" },
      textarea: { flex:1, padding:"11px 14px", fontSize:"15px", fontFamily:"'Libre Baskerville',serif", border:`1px solid ${C.border}`, borderRadius:"2px", background:C.white, color:C.ink, resize:"none", minHeight:"46px", maxHeight:"130px", lineHeight:1.5 },
      micBtn: (on) => ({ width:"44px", height:"44px", borderRadius:"50%", border:"none", flexShrink:0, background:on?C.red:C.ink, color:C.cream, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", animation:on?"pulse 1.2s infinite":"none", transition:"background 0.2s" }),
      sendBtn: (dis) => ({ padding:"11px 22px", background:dis?C.subtle:C.ink, color:C.cream, border:"none", borderRadius:"2px", fontSize:"12px", letterSpacing:"1.5px", textTransform:"uppercase", fontWeight:700, cursor:dis?"not-allowed":"pointer", whiteSpace:"nowrap", flexShrink:0, transition:"background 0.15s" }),
      summaryTrigger: { padding:"9px 18px", background:C.green, color:C.cream, border:"none", borderRadius:"2px", fontSize:"11px", letterSpacing:"1.5px", textTransform:"uppercase", fontWeight:700, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 },

      summaryWrap: { flex:1, overflow:"auto", padding:"40px 32px", maxWidth:"760px", width:"100%", margin:"0 auto", alignSelf:"center" },
      summaryH: { fontFamily:"'Playfair Display',serif", fontSize:"28px", fontWeight:700, marginBottom:"6px" },
      summaryMeta: { fontSize:"11px", letterSpacing:"2px", textTransform:"uppercase", color:C.muted, marginBottom:"28px", paddingBottom:"16px", borderBottom:`1px solid ${C.border}` },
      summaryBody: { fontSize:"15px", lineHeight:1.85, whiteSpace:"pre-wrap" },
      btnRow: { display:"flex", gap:"10px", marginTop:"32px", flexWrap:"wrap" },
      dlBtn:   { padding:"12px 26px", background:C.green, color:C.cream, border:"none", borderRadius:"2px", fontSize:"12px", letterSpacing:"1.5px", textTransform:"uppercase", fontWeight:700, cursor:"pointer" },
      cpBtn:   { padding:"12px 22px", background:"transparent", color:C.ink, border:`2px solid ${C.ink}`, borderRadius:"2px", fontSize:"12px", letterSpacing:"1.5px", textTransform:"uppercase", fontWeight:700, cursor:"pointer" },
      backBtn: { padding:"12px 18px", background:"transparent", color:C.muted, border:`1px solid ${C.border}`, borderRadius:"2px", fontSize:"12px", letterSpacing:"1px", textTransform:"uppercase", cursor:"pointer" },
    };

    const MicIcon = ({ on }) => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3" fill={on?"currentColor":"none"} />
        <path d="M5 10a7 7 0 0 0 14 0" /><line x1="12" y1="19" x2="12" y2="22" /><line x1="8" y1="22" x2="16" y2="22" />
      </svg>
    );

    // ─── COMPONENT ──────────────────────────────────────────────────────────

    function KennisAgent() {
      const [phase,     setPhase]     = useState("start");
      const [expert,    setExpert]    = useState(null);
      const [messages,  setMessages]  = useState([]);
      const [input,     setInput]     = useState("");
      const [loading,   setLoading]   = useState(false);
      const [summary,   setSummary]   = useState("");
      const [msgCount,  setMsgCount]  = useState(0);
      const [saved,     setSaved]     = useState(false);
      const [listening, setListening] = useState(false);
      const [interim,   setInterim]   = useState("");

      const bottomRef  = useRef(null);
      const inputRef   = useRef(null);
      const recognizer = useRef(null);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages, loading]);
      useEffect(() => { if (phase === "chat" && !loading) inputRef.current?.focus(); }, [phase, loading]);

      useEffect(() => {
        if (!hasSpeech) return;
        const r = new SpeechRecognition();
        r.lang = "nl-NL"; r.continuous = true; r.interimResults = true;
        r.onresult = (e) => {
          let fin = "", intr = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            const t = e.results[i][0].transcript;
            e.results[i].isFinal ? fin += t : intr += t;
          }
          if (fin) setInput(p => (p + " " + fin).trim());
          setInterim(intr);
        };
        r.onend  = () => { setListening(false); setInterim(""); };
        r.onerror= () => { setListening(false); setInterim(""); };
        recognizer.current = r;
        return () => { try { r.stop(); } catch(_) {} };
      }, []);

      const toggleMic = () => {
        if (!hasSpeech) return;
        if (listening) { recognizer.current.stop(); setListening(false); }
        else { try { recognizer.current.start(); setListening(true); } catch(_) {} }
      };
      const stopMic = () => { if (listening) { recognizer.current.stop(); setListening(false); } };

      const fullName = expert === "frank" ? "Frank Schuyer" : "Wouter Mellaart";
      const name     = expert === "frank" ? "Frank" : "Wouter";

      const startSession = async (person) => {
        setExpert(person); setPhase("chat"); setLoading(true);
        const n = person === "frank" ? "Frank" : "Wouter";
        const seed = [{ role:"user", content:`Hallo, ik ben ${n}.` }];
        try {
          const reply = await callClaude(SYSTEM_PROMPT, seed);
          setMessages([...seed, { role:"assistant", content:reply }]);
          setMsgCount(1);
        } catch(e) {
          setMessages([...seed, { role:"assistant", content:`Fout: ${e.message}` }]);
        }
        setLoading(false);
      };

      const sendMessage = async () => {
        stopMic();
        if (!input.trim() || loading) return;
        const userMsg = { role:"user", content:input.trim() };
        const updated = [...messages, userMsg];
        setMessages(updated); setInput(""); setInterim(""); setLoading(true);
        try {
          const reply = await callClaude(SYSTEM_PROMPT, updated);
          setMessages([...updated, { role:"assistant", content:reply }]);
          setMsgCount(c => c + 1);
        } catch(e) {
          setMessages([...updated, { role:"assistant", content:`Fout: ${e.message}` }]);
        }
        setLoading(false);
      };

      const generateSummary = async () => {
        stopMic(); setPhase("summary"); setLoading(true); setSummary(""); setSaved(false);
        const transcript = messages.map(m => `${m.role==="user"?fullName:"Agent"}: ${m.content}`).join("\n\n");
        try {
          const text = await callClaude(null, [{ role:"user", content:SUMMARY_PROMPT(fullName, transcript) }], 2000);
          setSummary(text);
        } catch(e) { setSummary(`Fout: ${e.message}`); }
        setLoading(false);
      };

      const handleKey = (e) => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
      const handleCopy = () => { navigator.clipboard.writeText(summary); setSaved(true); setTimeout(()=>setSaved(false),2500); };

      return (
        <div style={S.root}>
          <header style={S.header}>
            <div style={{ display:"flex", alignItems:"baseline" }}>
              <span style={S.logo}>tdme<span style={{ color:C.green }}>.</span></span>
              <span style={S.headerSub}>Input</span>
            </div>
            {expert && phase !== "start" && <span style={S.badge}>{fullName}</span>}
          </header>

          {phase === "start" && (
            <div style={S.startWrap}>
              <h1 style={S.h1}>Wie ben jij<span style={{ color:C.green, fontStyle:"italic" }}>?</span></h1>
              <p style={S.desc}>
                Deze agent stelt je gerichte vragen om jouw marketingkennis en -ervaring
                vast te leggen als kennisbasis voor de tdme Marketing Agent.
              </p>
              <div style={S.personBtns}>
                <button style={S.personBtn} onClick={() => startSession("frank")}>Frank Schuyer</button>
                <button style={S.personBtn} onClick={() => startSession("wouter")}>Wouter Mellaart</button>
              </div>
            </div>
          )}

          {phase === "chat" && (
            <>
              <div style={S.chatArea}>
                {messages.map((msg, i) =>
                  msg.role === "assistant" ? (
                    <div key={i} style={S.agentMsg} className="msg-enter">
                      <span style={S.lbl("left")}>Agent</span>
                      <div style={S.agentBubble}>{fmt(msg.content)}</div>
                    </div>
                  ) : (
                    <div key={i} style={S.userMsg} className="msg-enter">
                      <span style={S.lbl("right")}>{name}</span>
                      <div style={S.userBubble}>{fmt(msg.content)}</div>
                    </div>
                  )
                )}
                {loading && (
                  <div style={S.agentMsg}>
                    <span style={S.lbl("left")}>Agent</span>
                    <div style={S.agentBubble}>
                      <span style={S.dot("0s")} /><span style={S.dot("0.2s")} /><span style={S.dot("0.4s")} />
                    </div>
                  </div>
                )}
                <div ref={bottomRef} />
              </div>

              <div style={S.inputBar}>
                <div style={S.inputInner}>
                  {msgCount >= 8 && (
                    <button style={S.summaryTrigger} onClick={generateSummary}>Samenvatting →</button>
                  )}
                  <textarea
                    ref={inputRef}
                    style={{ ...S.textarea, color: interim ? C.muted : C.ink }}
                    value={input + (interim ? " " + interim : "")}
                    onChange={e => { if (!listening) setInput(e.target.value); }}
                    onKeyDown={handleKey}
                    placeholder={listening ? "Luisteren…" : "Typ of spreek je antwoord… (Enter = verstuur)"}
                    rows={1} disabled={loading}
                  />
                  {hasSpeech && (
                    <button style={S.micBtn(listening)} onClick={toggleMic} disabled={loading} title={listening?"Stop":"Spreek in"}>
                      <MicIcon on={listening} />
                    </button>
                  )}
                  <button style={S.sendBtn(!input.trim() || loading)} onClick={sendMessage} disabled={!input.trim() || loading}>
                    Verstuur
                  </button>
                </div>
              </div>
            </>
          )}

          {phase === "summary" && (
            <div style={S.summaryWrap}>
              <h2 style={S.summaryH}>Kennissamenvatting</h2>
              <p style={S.summaryMeta}>{fullName} · tdme Input · v1</p>
              {loading ? (
                <p style={{ color:C.muted, fontStyle:"italic" }}>Samenvatting wordt gegenereerd…</p>
              ) : (
                <>
                  <div style={S.summaryBody}>{summary}</div>
                  <div style={S.btnRow}>
                    <button style={S.dlBtn} onClick={() => downloadMd(fullName, summary)}>↓ Download .md</button>
                    <button style={S.cpBtn} onClick={handleCopy}>{saved?"Gekopieerd ✓":"Kopieer"}</button>
                    <button style={S.backBtn} onClick={() => { setPhase("chat"); setSummary(""); }}>← Terug</button>
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<KennisAgent />);
  </script>
</body>
</html>
